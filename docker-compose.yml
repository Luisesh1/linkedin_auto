services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    image: autolinkedin:production
    container_name: autolinkedin-app
    restart: unless-stopped
    init: true
    shm_size: "1gb"
    env_file:
      - .env
    ports:
      - "127.0.0.1:${APP_HOST_PORT:-5000}:5000"
    environment:
      APP_PORT: "5000"
      APP_DEBUG: "false"
      APP_HEADLESS: "true"
      APP_CONFIG_PATH: /app/data/config.yaml
      DB_PATH: /app/data/posts.db
      LINKEDIN_SESSION_DIR: /app/data/linkedin_session
      LINKEDIN_HISTORY_FILE: /app/data/post_history.json
      WEB_CONCURRENCY: "1"
      GUNICORN_THREADS: ${GUNICORN_THREADS:-4}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-180}
    volumes:
      - ./data:/app/data
      - ./static/generated:/app/static/generated
      - ./static/debug:/app/static/debug
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/healthz', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
